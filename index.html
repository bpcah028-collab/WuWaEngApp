  <style>

    html { min-height: 100%; background: var(--bg); }

    body {

      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;

        radial-gradient(circle at 20% -10%, rgba(255, 43, 214, 0.28), transparent 35%),
        radial-gradient(circle at 90% 10%, rgba(0, 245, 255, 0.22), transparent 32%),
        linear-gradient(160deg, #070814 0%, #0b1024 45%, #13051b 100%);
      overflow-x: hidden;
      touch-action: manipulation;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.035) 0px,
          rgba(255, 255, 255, 0.035) 1px,
          transparent 2px,
          transparent 6px

      mix-blend-mode: screen;
      opacity: 0.28;

    button, input, textarea { font: inherit; }

    button {
      border: none;
      color: var(--text);
      border-radius: 14px;
      min-height: 48px;
      padding: 12px 14px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      transition: transform 0.08s ease, filter 0.16s ease, box-shadow 0.16s ease;
    }

    button:active { transform: translateY(1px) scale(0.99); filter: brightness(1.12); }
    button:disabled { opacity: 0.38; cursor: not-allowed; filter: grayscale(0.4); }

    .app {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 16px 14px calc(22px + var(--safe-bottom));
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 18px;
      margin: 4px 0 14px;
      background:
        linear-gradient(135deg, rgba(0, 245, 255, 0.14), rgba(255, 43, 214, 0.12)),
        rgba(11, 15, 34, 0.92);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-cyan), var(--shadow-pink);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -30px;
      top: -45px;
      width: 140px;
      height: 140px;
      border: 1px solid rgba(255, 231, 94, 0.18);
      transform: rotate(32deg);
      box-shadow: 0 0 32px rgba(255, 231, 94, 0.12);
    }

    .kicker {
      margin: 0 0 6px;
      color: var(--cyan);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 7vw, 36px);
      line-height: 1.05;
      letter-spacing: -0.04em;
      text-shadow: 0 0 14px rgba(0, 245, 255, 0.4);
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .global-grid, .category-grid, .manager-actions, .reveal-wrap, .level-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 14px 0;
    }

    .btn-primary {
      background:
        linear-gradient(135deg, rgba(0, 245, 255, 0.26), rgba(0, 245, 255, 0.08)),
        rgba(0, 245, 255, 0.08);
      color: #f7feff;
      box-shadow: inset 0 0 0 1px rgba(0, 245, 255, 0.45), 0 0 18px rgba(0, 245, 255, 0.18);
      font-weight: 800;
    }

    .btn-secondary {
      background:
        linear-gradient(135deg, rgba(255, 43, 214, 0.22), rgba(255, 43, 214, 0.08)),
        rgba(255, 43, 214, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 43, 214, 0.42), 0 0 18px rgba(255, 43, 214, 0.16);
      font-weight: 800;
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.07);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.11);
    }

    .level-btn-0 {
      background: linear-gradient(135deg, rgba(255, 77, 109, 0.28), rgba(255, 77, 109, 0.1));
      box-shadow: inset 0 0 0 1px rgba(255, 77, 109, 0.48);
      font-weight: 900;
    }

    .level-btn-1 {
      background: linear-gradient(135deg, rgba(255, 231, 94, 0.25), rgba(255, 231, 94, 0.09));
      box-shadow: inset 0 0 0 1px rgba(255, 231, 94, 0.42);
      font-weight: 900;
    }

    .level-btn-2 {
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.25), rgba(0, 245, 255, 0.09));
      box-shadow: inset 0 0 0 1px rgba(0, 245, 255, 0.45);
      font-weight: 900;
    }

    .level-btn-3 {
      background: linear-gradient(135deg, rgba(68, 255, 154, 0.28), rgba(68, 255, 154, 0.1));
      box-shadow: inset 0 0 0 1px rgba(68, 255, 154, 0.5);
      font-weight: 900;
    }

    .section-list { display: grid; gap: 12px; }

    .section-card, .quiz-card, .result-card, .manager-card {
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent),
        var(--panel);
      border: 1px solid rgba(0, 245, 255, 0.22);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.34);
      overflow: hidden;
    }

    .section-card, .manager-card, .quiz-card, .result-card { padding: 14px; }

    .section-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .section-title { margin: 0; font-size: 18px; letter-spacing: -0.02em; }
    .section-range { margin: 4px 0 0; color: var(--muted); font-size: 12px; }

    .status-pill {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--yellow);
      background: rgba(255, 231, 94, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 231, 94, 0.28);
      white-space: nowrap;
      font-weight: 800;
    }

    .section-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;

      display: inline-flex;
      align-items: center;

      background: rgba(255, 255, 255, 0.07);
      color: var(--muted);
      font-size: 12px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);

    .chip.level-2 { color: #dffcff; box-shadow: inset 0 0 0 1px rgba(0, 245, 255, 0.35); }
    .chip.level-3 { color: #e2ffef; box-shadow: inset 0 0 0 1px rgba(68, 255, 154, 0.35); }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: -2px -4px 12px;
      padding: 10px 4px;
      background: linear-gradient(180deg, rgba(7, 8, 20, 0.96), rgba(7, 8, 20, 0.72), transparent);

      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      box-shadow: 0 0 14px rgba(0, 245, 255, 0.35);
      transition: width 0.22s ease;
    }

    .hint-label, .phrase-label, .answer-label, .translation-label {

      color: var(--cyan);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 900;

    .hint {

      padding: 13px;
      border-radius: 14px;
      background: rgba(0, 245, 255, 0.07);
      color: #dffcff;
      line-height: 1.6;
      border: 1px solid rgba(0, 245, 255, 0.18);

    .example {

      letter-spacing: -0.02em;
      font-weight: 850;
      border: 1px solid rgba(255, 255, 255, 0.1);
      word-break: normal;

    .context-box {
      margin: 0;
      padding: 16px;
      border-radius: 16px;

      font-size: clamp(22px, 6.2vw, 30px);
      line-height: 1.38;
      letter-spacing: -0.02em;
      font-weight: 850;

      text-shadow: 0 0 14px rgba(255, 231, 94, 0.45);

    .answer-box {

      padding: 14px;
      border-radius: 16px;
      background: rgba(68, 255, 154, 0.08);
      border: 1px solid rgba(68, 255, 154, 0.22);

    .speech-title { margin: 0 0 9px; color: var(--muted); font-size: 13px; line-height: 1.5; }

    .rate-toggle {

      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 9px;

    .rate-btn { min-height: 42px; padding: 9px 10px; color: var(--muted); }

      margin-top: 10px;

    .level-actions button {
      min-height: 42px;
      padding: 8px 10px;
      font-size: 13px;

      .section-actions { grid-template-columns: 1fr 1fr 1fr; }
      .card-actions { grid-template-columns: 1fr 1fr 1fr; }
      .level-actions { grid-template-columns: 1fr 1fr; }
    }
  </style>

    let customPhrases = loadCustomPhrases();
    let WORDS = [];
    let progress = loadProgress();
    let session = null;
    let listSession = null;
    let speechRate = 1.0;
    let toastTimer = null;

    function hasOwn(obj, key) {
      return Object.prototype.hasOwnProperty.call(obj, key);
    }

    function loadProgress() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return normalizeProgress(saved);
      } catch (_) {
        return normalizeProgress(null);
      }
    }

    function normalizeProgress(saved) {
      saved = saved || {};
      const attempted = Array.isArray(saved.attempted) ? saved.attempted.slice() : [];
      const weak = Array.isArray(saved.weak) ? saved.weak.slice() : [];
      const mastered = Array.isArray(saved.mastered) ? saved.mastered.slice() : [];
      const levels = {};
      const oldLevels = saved.levels && typeof saved.levels === "object" ? saved.levels : null;

      if (oldLevels) {
        Object.keys(oldLevels).forEach(function(id) {
          const n = Number(oldLevels[id]);
          levels[String(id)] = isNaN(n) ? 0 : Math.max(0, Math.min(3, n));
          uniquePush(attempted, id);
        });
      } else {
        attempted.forEach(function(id) { levels[String(id)] = 0; });
        weak.forEach(function(id) { levels[String(id)] = 0; uniquePush(attempted, id); });
        mastered.forEach(function(id) { levels[String(id)] = 1; uniquePush(attempted, id); });
      }

      return { weak: weak, attempted: attempted, mastered: mastered, levels: levels };
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    }

    function loadCustomPhrases() {
      try {
        const saved = JSON.parse(localStorage.getItem(CUSTOM_STORAGE_KEY));
        if (!Array.isArray(saved)) return [];
        return saved.filter(function(item) {
          return item && (item.answer || item.word) && item.phrase && item.translation;
        }).map(normalizeItem);
      } catch (_) {
        return [];
      }
    }

    function saveCustomPhrases() {
      localStorage.setItem(CUSTOM_STORAGE_KEY, JSON.stringify(customPhrases));
    }

    function normalizeItem(raw) {
      const answer = String(raw.answer || raw.word || "").trim();
      const type = raw.type || (answer.split(/\s+/).length > 1 || /[.,?!]/.test(answer) ? "chunk" : "word");
      return {
        id: raw.id,
        type: type,
        answer: answer,
        word: answer,
        meaning: raw.meaning || raw.ja || raw.translation || "",
        ja: raw.ja || raw.meaning || raw.translation || "",
        phrase: raw.phrase || "",
        translation: raw.translation || raw.ja || raw.meaning || "",
        example: type === "chunk" ? "" : (raw.example || ""),
        category: raw.category || "カスタム追加",
        source: raw.source || "カスタム追加"
      };
    }

    function buildWords() {
      const result = [];
      const seen = {};
      function add(raw, fallbackId) {
        const item = normalizeItem(raw);
        item.id = item.id || fallbackId;
        if (!item.answer || !item.phrase) return;
        const key = duplicateKey(item);
        if (seen[key]) return;
        seen[key] = true;
        result.push(item);
      }

      BUILT_IN_ITEMS.forEach(function(item, index) { add(item, index + 1); });
      customPhrases.forEach(function(item) { add(item, item.id); });
      return result;
    }

    function refreshWords() {
      WORDS = buildWords();
    }

    function uniquePush(list, id) {
      if (list.indexOf(id) < 0) list.push(id);
    }

    function removeFrom(list, id) {
      const idx = list.indexOf(id);
      if (idx >= 0) list.splice(idx, 1);
    }

    function setItemLevel(id, level) {
      const key = String(id);
      const n = Math.max(0, Math.min(3, Number(level) || 0));
      progress.levels[key] = n;
      uniquePush(progress.attempted, id);

      // 旧UI/旧データ互換用。v5の判定そのものはlevelsを使用。
      if (n === 0) {
        uniquePush(progress.weak, id);
        removeFrom(progress.mastered, id);
      } else if (n === 1) {
        removeFrom(progress.weak, id);
        removeFrom(progress.mastered, id);
      } else {
        removeFrom(progress.weak, id);
        uniquePush(progress.mastered, id);
      }
      saveProgress();
    }

    function getLevel(item) {
      const key = String(item.id);
      if (hasOwn(progress.levels, key)) {
        const n = Number(progress.levels[key]);
        return isNaN(n) ? 0 : Math.max(0, Math.min(3, n));
      }
      return 0;
    }

    function isStarted(item) {
      return progress.attempted.indexOf(item.id) >= 0 || hasOwn(progress.levels, String(item.id));
    }

    function statusInfo(item) {
      if (!isStarted(item)) {
        return { label: "未着手", level: 0, className: "level-0", emoji: "🆕" };
      }
      const level = getLevel(item);
      const info = LEVELS[level] || LEVELS[0];
      return { label: info.label, level: level, className: info.className, emoji: info.emoji };
    }

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/[’‘]/g, "'")
        .replace(/[“”]/g, '"')
        .replace(/[\u2026]/g, "...")
        .replace(/[^a-z0-9\s'ぁ-んァ-ン一-龥ー]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function duplicateKey(item) {
      return normalizeText(item.phrase) + "||" + normalizeText(item.answer);
    }

    function answerForFill(item) {
      const ans = String(item.answer || item.word || "").trim();
      if (item.type === "chunk") return ans;
      const lower = ans.toLowerCase();
      if (START_BLANK_REGEX.test(String(item.phrase || ""))) {
        return lower.charAt(0).toUpperCase() + lower.slice(1);
      }
      return lower;
    }

    function answerForDisplay(item) {
      return item.type === "chunk"
        ? String(item.answer || "").trim()
        : String(item.answer || item.word || "").trim().toLowerCase();
    }

    function filledPhrase(item) {
      return String(item.phrase || "").replace(BLANK_REGEX, answerForFill(item));
    }

    function splitBlankContext(item) {
      const phrase = String(item.phrase || "");
      const m = phrase.match(BLANK_REGEX);
      if (!m) return { before: "", after: phrase };
      return {
        before: phrase.slice(0, m.index).trim(),
        after: phrase.slice(m.index + m[0].length).trim()
      };
    }

    function escapeHTML(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(text) {
      return String(text).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    function jsString(value) {
      return String(value).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    function maskedPhraseHTML(item) {
      return escapeHTML(item.phrase).replace(/\(\s*_{3,}\s*\)|_{3,}/, '<span class="blank">( _____ )</span>');
    }

    function shuffle(items) {
      const arr = items.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = arr[i];
        arr[i] = arr[j];
        arr[j] = temp;
      }
      return arr;
    }

    function sectionCount() {
      return Math.ceil(WORDS.length / SECTION_SIZE);
    }

    function sectionItems(sectionNumber) {
      const startIndex = (sectionNumber - 1) * SECTION_SIZE;
      return WORDS.slice(startIndex, startIndex + SECTION_SIZE);
    }

    function typeItems(type) {
      return WORDS.filter(function(item) { return item.type === type; });
    }

    function categoryItems(category) {
      return WORDS.filter(function(item) { return item.category === category; });
    }

    function levelItems(levelKey, items) {
      items = items || WORDS;
      if (levelKey === "unready") {
        return items.filter(function(item) { return !isStarted(item) || getLevel(item) === 0; });
      }
      const level = Number(levelKey);
      return items.filter(function(item) { return isStarted(item) && getLevel(item) === level; });
    }

    function countAttempted(items) {
      return items.filter(function(item) { return isStarted(item); }).length;
    }

    function levelStats(items) {
      const stats = { unready: 0, known: 0, instant: 0, conversation: 0 };
      items.forEach(function(item) {
        if (!isStarted(item) || getLevel(item) === 0) stats.unready++;
        else if (getLevel(item) === 1) stats.known++;
        else if (getLevel(item) === 2) stats.instant++;
        else if (getLevel(item) === 3) stats.conversation++;
      });
      return stats;
    }

    function getSectionStatus(items) {
      const stats = levelStats(items);
      const attemptedCount = countAttempted(items);
      if (attemptedCount === 0) {
        return { label: "未着手", stats: stats, attemptedCount: attemptedCount };
      }
      if (stats.conversation === items.length) {
        return { label: "会話で使える ✨", stats: stats, attemptedCount: attemptedCount };
      }
      return { label: "会話OK：" + stats.conversation + "/" + items.length, stats: stats, attemptedCount: attemptedCount };
    }

    function categories() {
      const seen = {};
      WORDS.forEach(function(item) { seen[item.category || "その他"] = true; });
      return Object.keys(seen);
    }

    function getItemById(id) {
      return WORDS.find(function(item) { return String(item.id) === String(id); });

      if (item) startQuiz([item], "この1問だけ");
    }

    function startQuiz(items, title) {
      if (!items.length) {
        showToast("対象フレーズがありません。");
        return;
      }

      session = {
        title: title,
        items: items.slice(),
        index: 0,
        revealed: false,
        counts: { 0: 0, 1: 0, 2: 0, 3: 0 },
        judgedIds: [],
        finished: false
      };
      listSession = null;
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      renderQuiz();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuestionArea(item) {
      if (item.type !== "chunk") {
        return `<p class="phrase-label">Blank Phrase</p><p class="phrase">${maskedPhraseHTML(item)}</p>`;
      }

      const ctx = splitBlankContext(item);
      let context = "";
      if (ctx.before && ctx.after) context = `${escapeHTML(ctx.before)} <span class="blank">[...]</span> ${escapeHTML(ctx.after)}`;
      else if (ctx.after) context = escapeHTML(ctx.after);
      else if (ctx.before) context = escapeHTML(ctx.before);
      else context = "文脈なし";

      return `<p class="phrase-label">Context</p><div class="context-box"><div class="context-text">${context}</div></div>`;
    }

    function renderQuiz() {
      const item = session.items[session.index];
      const total = session.items.length;
      const current = session.index + 1;
      const percent = Math.round((session.index / total) * 100);
      const answer = answerForDisplay(item);
      const full = filledPhrase(item);
      const typeLabel = item.type === "chunk" ? "塊フレーズ" : "単語";
      const status = statusInfo(item);

      document.getElementById("app").innerHTML = `
        <div class="top-bar">
          <button class="home-btn btn-ghost" onclick="goHomeMaybe()">🏠 ホームへ戻る</button>
        </div>

        <section class="quiz-card">
          <div class="quiz-meta">
            <span>${escapeHTML(session.title)}</span>
            <strong>${current} / ${total}</strong>
          </div>
          <div class="progress-wrap"><div class="progress-bar" style="width:${percent}%"></div></div>

          <div class="mini-stats">
            <span class="chip">${escapeHTML(typeLabel)}</span>
            <span class="chip ${escapeHTML(status.className)}">${escapeHTML(status.emoji + " " + status.label)}</span>
            <span class="chip">${escapeHTML(item.category || "その他")}</span>
          </div>

          <p class="hint-label">Meaning</p>
          <p class="hint">${escapeHTML(item.meaning || item.ja || item.translation)}</p>

          ${item.example && item.type !== "chunk" ? `
            <p class="hint-label">Example</p>
            <p class="example">${escapeHTML(item.example)}</p>
          ` : ""}

          ${renderQuestionArea(item)}

          ${session.revealed ? `
            <div class="answer-box">
              <p class="answer-label">Answer</p>
              <p class="answer-word">${escapeHTML(answer)}</p>
              <p class="full-phrase">${escapeHTML(full)}</p>
              <div class="translation-box">
                <p class="translation-label">Japanese Translation</p>
                <p class="translation-text">${escapeHTML(item.translation || "")}</p>
              </div>
              <p class="level-help">判定目安：1秒以内に答えを言えたら「すぐ言える」。例文以外で1文作れたら「会話で使える」。</p>
            </div>

            <div class="speech-panel">
              <p class="speech-title">読み上げ速度</p>
              <div class="rate-toggle">
                <button class="rate-btn ${speechRate === 1.0 ? "active" : ""}" onclick="setSpeechRate(1.0)">1.0x 標準</button>
                <button class="rate-btn ${speechRate === 0.8 ? "active" : ""}" onclick="setSpeechRate(0.8)">0.8x 遅め</button>
                <button class="rate-btn ${speechRate === 0.5 ? "active" : ""}" onclick="setSpeechRate(0.5)">0.5x 超ゆっくり</button>
              </div>
              <div class="speech-actions">
                <button class="btn-primary" onclick="speakPhrase()">フレーズ全体</button>
                <button class="btn-secondary" onclick="speakAnswer()">答えだけ</button>
              </div>
            </div>

            <div class="judge-bar">
              <button class="level-btn-0" onclick="setLearningLevel(0)">😵 まだ無理</button>
              <button class="level-btn-1" onclick="setLearningLevel(1)">👀 知ってる</button>
              <button class="level-btn-2" onclick="setLearningLevel(2)">⚡ 1秒で言える</button>
              <button class="level-btn-3" onclick="setLearningLevel(3)">🗣 会話で使える</button>
            </div>
          ` : `
            <div class="reveal-wrap">
              <button class="btn-primary" onclick="revealAnswer()">答えを見る</button>
            </div>
          `}
        </section>
      `;
    }

    function revealAnswer() {
      session.revealed = true;
      renderQuiz();
    }

    function setSpeechRate(rate) {
      speechRate = rate;
      renderQuiz();
    }

    function speakPhrase() {
      const item = session.items[session.index];
      speak(filledPhrase(item));
    }

    function speakAnswer() {
      const item = session.items[session.index];
      speak(answerForDisplay(item));
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) {
        showToast("このブラウザでは音声読み上げに対応していません。");
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = speechRate;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }

    function setLearningLevel(level) {
      const item = session.items[session.index];
      const n = Math.max(0, Math.min(3, Number(level) || 0));
      setItemLevel(item.id, n);
      session.counts[n] += 1;
      uniquePush(session.judgedIds, item.id);

      const info = LEVELS[n] || LEVELS[0];
      showToast("保存しました：" + info.label);

      if (window.speechSynthesis) window.speechSynthesis.cancel();

      if (session.index + 1 >= session.items.length) {
        session.finished = true;
        renderResult();
      } else {
        session.index += 1;
        session.revealed = false;
        renderQuiz();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function renderResult() {
      const total = session.items.length;
      const globalStats = levelStats(WORDS);

      document.getElementById("app").innerHTML = `
        <div class="top-bar">
          <button class="home-btn btn-ghost" onclick="renderHome()">🏠 ホームへ戻る</button>
        </div>

        <section class="result-card">
          <p class="kicker">Session Complete</p>
          <h2>おつかれ！</h2>
          <p class="subtitle">判定結果はすべて保存済みです。</p>

          <div class="result-score">
            <div class="score-box"><span class="score-num" style="color:var(--red);">${session.counts[0]}</span><span>まだ無理</span></div>
            <div class="score-box"><span class="score-num" style="color:var(--yellow);">${session.counts[1]}</span><span>知ってる</span></div>
            <div class="score-box"><span class="score-num" style="color:var(--cyan);">${session.counts[2]}</span><span>1秒で言える</span></div>
            <div class="score-box"><span class="score-num" style="color:var(--green);">${session.counts[3]}</span><span>会話で使える</span></div>
          </div>

          <div class="empty-box">
            今回：${total}問<br>
            全体：未着手/未定着 ${globalStats.unready} / 知ってる ${globalStats.known} / すぐ言える ${globalStats.instant} / 会話 ${globalStats.conversation}
          </div>

          <div class="reveal-wrap">
            ${session.counts[0] > 0 ? `<button class="btn-secondary" onclick="retrySessionLevel(0)">今回の「まだ無理」だけ再挑戦</button>` : ""}
            ${session.counts[1] > 0 ? `<button class="btn-primary" onclick="retrySessionLevel(1)">今回の「知ってる」だけ練習</button>` : ""}
            <button class="btn-primary" onclick="renderHome()">ホームへ戻る</button>
          </div>
        </section>
      `;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function retrySessionLevel(level) {
      const ids = {};
      session.judgedIds.forEach(function(id) {
        const item = getItemById(id);
        if (item && getLevel(item) === Number(level)) ids[String(id)] = true;
      });
      startQuiz(WORDS.filter(function(item) { return ids[String(item.id)]; }), LEVELS[level].label + " 再挑戦");
    }

    function renderListView(title, items, initialFilter) {
      listSession = {
        title: title,
        items: items.slice(),
        filter: initialFilter == null ? "all" : initialFilter
      };
      session = null;

      document.getElementById("app").innerHTML = `
        <div class="top-bar">
          <button class="home-btn btn-ghost" onclick="renderHome()">🏠 ホームへ戻る</button>
        </div>
        <section class="manager-card">
          <p class="kicker">Phrase List</p>
          <h2 class="section-title">${escapeHTML(title)}</h2>
          <p class="subtitle">一覧から読み上げ・1問だけ出題・レベル変更ができます。</p>
          <input id="listSearch" class="search-input" placeholder="検索：think / なんて / ガチャ / Aymes" oninput="renderListItems()">

          <div class="level-grid">
            <button class="btn-ghost" onclick="setListFilter('all')">すべて</button>
            <button class="level-btn-0" onclick="setListFilter('unready')">未着手/未定着</button>
            <button class="level-btn-1" onclick="setListFilter(1)">知ってる</button>
            <button class="level-btn-2" onclick="setListFilter(2)">すぐ言える</button>
            <button class="level-btn-3" onclick="setListFilter(3)">会話で使える</button>
          </div>

          <div id="listStats" class="mini-stats"></div>
          <div id="listItems" class="list-grid"></div>
        </section>
      `;
      renderListItems();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setListFilter(filter) {
      if (!listSession) return;
      listSession.filter = filter;
      renderListItems();
    }

    function filteredListItems() {
      if (!listSession) return [];
      const qEl = document.getElementById("listSearch");
      const q = normalizeText(qEl ? qEl.value : "");
      let items = listSession.items.slice();

      if (listSession.filter !== "all") {
        items = levelItems(listSession.filter, items);
      }

      if (q) {
        items = items.filter(function(item) {
          return normalizeText([
            item.answer,
            item.meaning,
            item.ja,
            item.phrase,
            item.translation,
            item.example,
            item.category,
            statusInfo(item).label
          ].join(" ")).indexOf(q) >= 0;
        });
      }

      return items;
    }

    function renderListItems() {
      if (!listSession) return;
      const items = filteredListItems();
      const stats = levelStats(items);
      document.getElementById("listStats").innerHTML = renderStatChips(stats, items.length);
      document.getElementById("listItems").innerHTML =
        items.map(renderListCard).join("") || `<div class="empty-box">該当するフレーズがありません。</div>`;
    }

    function renderListCard(item) {
      const id = jsString(item.id);
      const status = statusInfo(item);

      return `
        <article class="list-card">
          <p class="list-answer">${escapeHTML(answerForDisplay(item))}</p>
          <div class="mini-stats">
            <span class="chip">${escapeHTML(item.type === "chunk" ? "塊" : "単語")}</span>
            <span class="chip ${escapeHTML(status.className)}">${escapeHTML(status.emoji + " " + status.label)}</span>
            <span class="chip">${escapeHTML(item.category || "その他")}</span>
          </div>
          <p class="list-meaning">意味：${escapeHTML(item.meaning || item.ja || "")}</p>
          ${item.example && item.type !== "chunk"
            ? `<p class="list-example">例文：${escapeHTML(item.example)}</p>`
            : `<p class="list-example">問題：${escapeHTML(item.phrase)}</p>`}
          <p class="list-translation">訳：${escapeHTML(item.translation || "")}</p>

          <div class="card-actions">
            <button class="btn-primary" onclick="speakItemPhrase('${id}')">フレーズ再生</button>
            <button class="btn-secondary" onclick="speakItemAnswer('${id}')">答え再生</button>
            <button class="btn-ghost" onclick="startSingle('${id}')">この1問だけ</button>
          </div>

          <div class="level-actions">
            <button class="level-btn-0" onclick="setLevelFromList('${id}',0)">😵 まだ無理</button>
            <button class="level-btn-1" onclick="setLevelFromList('${id}',1)">👀 知ってる</button>
            <button class="level-btn-2" onclick="setLevelFromList('${id}',2)">⚡ 1秒</button>
            <button class="level-btn-3" onclick="setLevelFromList('${id}',3)">🗣 会話</button>
          </div>
        </article>
      `;
    }

    function setLevelFromList(id, level) {
      const item = getItemById(id);
      if (!item) return;
      setItemLevel(item.id, level);
      const info = LEVELS[level] || LEVELS[0];
      showToast("保存しました：" + info.label);
      renderListItems();
    }

    function speakItemPhrase(id) {
      const item = getItemById(id);
      if (item) speak(filledPhrase(item));
    }

    function speakItemAnswer(id) {
      const item = getItemById(id);
      if (item) speak(answerForDisplay(item));
    }

    function renderImportManager() {
      session = null;
      listSession = null;
      const sample = 'I’m gonna | 〜するつもり | I’m gonna play Wuthering Waves after work. | 仕事のあと鳴潮をやるつもり。 | _____ play Wuthering Waves after work.\\n\\n[[I had a blast]] at the event.\\n（イベントでめちゃくちゃ楽しかった）';

      document.getElementById("app").innerHTML = `
        <div class="top-bar">
          <button class="home-btn btn-ghost" onclick="renderHome()">🏠 ホームへ戻る</button>
        </div>

        <section class="manager-card">
          <p class="kicker">Phrase Import</p>
          <h2 class="section-title">追加フレーズ管理</h2>
          <p class="subtitle">
            塊フレーズは <code>正解 | 意味 | 例文 | 日本語訳 | 穴埋め</code> 形式で追加できます。
            旧形式の <code>[[答え]]</code> も使えます。
          </p>

          <div class="format-box">
            <code>I’m gonna | 〜するつもり | I’m gonna play Wuthering Waves after work. | 仕事のあと鳴潮をやるつもり。 | _____ play Wuthering Waves after work.</code>
          </div>

          <textarea id="importText" class="textarea" spellcheck="false" placeholder="${escapeHTML(sample)}"></textarea>

          <div class="manager-actions">
            <button class="btn-primary" onclick="previewImportPhrases()">プレビュー / 重複チェック</button>
            <button class="btn-secondary" onclick="addImportedPhrases()">重複を除いて追加</button>
            <button class="btn-ghost" onclick="copyCustomPhrases()">追加済みデータをコピー</button>
            <button class="btn-ghost" onclick="clearCustomPhrases()">自分で追加した分を削除</button>
          </div>

          <div id="importPreview" class="preview-list"></div>
        </section>
      `;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function stripJapaneseParen(text) {
      return String(text || "").replace(/^（/, "").replace(/）$/, "").replace(/^\(/, "").replace(/\)$/, "").trim();
    }

    function parseImportText(text) {
      const blocks = String(text || "").split(/\n\s*\n/);
      const parsed = [];
      const errors = [];

      blocks.forEach(function(block) {
        const lines = block.split(/\n/).map(function(line) { return line.trim(); }).filter(Boolean);
        if (!lines.length) return;

        if (lines.length === 1 && lines[0].indexOf("|") >= 0) {
          const parts = lines[0].split("|").map(function(part) { return part.trim(); });
          if (parts.length >= 5) {
            parsed.push(makeImportedItem(parts[0], parts[1], parts[2], parts[3], parts[4], "カスタム追加"));
          } else {
            errors.push("形式エラー：| 区切りは5項目必要です → " + lines[0]);
          }
          return;
        }

        const first = lines[0];
        const match = first.match(/\[\[([^\]]+)\]\]/);
        if (!match) {
          errors.push("スキップ：[[答え]] が見つかりません → " + first);
          return;
        }

        const answer = match[1].trim();
        const phrase = first.replace(/\[\[[^\]]+\]\]/, "( _____ )");
        let translation = "";
        if (lines[1] && /^[（(].*[）)]$/.test(lines[1])) {
          translation = stripJapaneseParen(lines[1]);
        }
        if (!translation) {
          errors.push("スキップ：日本語訳が不足しています → " + first);
          return;
        }
        parsed.push(makeImportedItem(answer, translation, first.replace(/\[\[|\]\]/g, ""), translation, phrase, "カスタム追加"));
      });

      return { items: parsed, errors: errors };
    }

    function makeImportedItem(answer, meaning, example, translation, phrase, category) {
      const normalizedPhrase = String(phrase || "").replace(BLANK_REGEX, "( _____ )");
      const type = String(answer).trim().split(/\s+/).length > 1 || /[.,?!]/.test(answer) ? "chunk" : "word";
      return normalizeItem({
        type: type,
        answer: answer,
        meaning: meaning,
        example: example,
        translation: translation,
        phrase: normalizedPhrase,
        category: category,
        source: "カスタム追加"
      });
    }

    function classifyImportedItems(items) {
      refreshWords();
      const seen = {};
      WORDS.forEach(function(item) { seen[duplicateKey(item)] = true; });

      return items.map(function(item) {
        const key = duplicateKey(item);
        const duplicate = !!seen[key];
        if (!duplicate) seen[key] = true;
        return { item: item, duplicate: duplicate, key: key };
      });
    }

    function previewImportPhrases() {
      const textEl = document.getElementById("importText");
      const previewEl = document.getElementById("importPreview");
      const parsed = parseImportText(textEl.value);
      const classified = classifyImportedItems(parsed.items);
      const addCount = classified.filter(function(row) { return !row.duplicate; }).length;
      const skipCount = classified.filter(function(row) { return row.duplicate; }).length;

      let output = `
        <div class="preview-item">
          <strong>プレビュー：</strong>追加 ${addCount}件 / 重複スキップ ${skipCount}件 / 形式エラー ${parsed.errors.length}件
        </div>
      `;

      classified.forEach(function(row) {
        const item = row.item;
        output += `
          <div class="preview-item ${row.duplicate ? "skip" : ""}">
            <strong>${row.duplicate ? "重複スキップ" : "追加予定"}</strong>
            <span class="chip">${escapeHTML(item.type === "chunk" ? "塊" : "単語")}</span><br>
            答え：${escapeHTML(answerForDisplay(item))}<br>
            問題：${escapeHTML(item.phrase)}<br>
            完成：${escapeHTML(filledPhrase(item))}<br>
            <span style="color: var(--muted);">${escapeHTML(item.translation)}</span>
          </div>
        `;
      });

      parsed.errors.forEach(function(error) {
        output += `<div class="preview-item skip"><strong>形式エラー</strong><br>${escapeHTML(error)}</div>`;
      });

      previewEl.innerHTML = output;
    }

    function addImportedPhrases() {
      const textEl = document.getElementById("importText");
      const parsed = parseImportText(textEl.value);
      const classified = classifyImportedItems(parsed.items);
      let added = 0;
      let skipped = 0;

      classified.forEach(function(row) {
        if (row.duplicate) {
          skipped++;
          return;
        }
        const item = row.item;
        item.id = "custom:" + Math.abs(hashString(row.key)).toString(36);
        customPhrases.push(item);
        added++;
      });

      saveCustomPhrases();
      refreshWords();
      showToast("追加 " + added + "件 / 重複スキップ " + skipped + "件");
      previewImportPhrases();
    }

    function hashString(text) {
      let hash = 0;
      const str = String(text || "");
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return hash;
    }

    function copyCustomPhrases() {
      const text = JSON.stringify(customPhrases, null, 2);
      if (!customPhrases.length) {
        showToast("コピーできる追加データがありません。");
        return;
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          showToast("追加済みデータをコピーしました。");
        }).catch(function() {
          showToast("コピーに失敗しました。");
        });
      } else {
        showToast("このブラウザではコピーに対応していません。");
      }
    }

    function clearCustomPhrases() {
      if (!customPhrases.length) {
        showToast("自分で追加したフレーズはありません。");
        return;
      }
      const ok = confirm("自分で追加したフレーズをすべて削除しますか？\n基本データと内蔵追加分は消えません。");
      if (!ok) return;
      customPhrases = [];
      saveCustomPhrases();
      refreshWords();
      showToast("自分で追加したフレーズを削除しました。");
      renderHome();
    }

    function goHomeMaybe() {
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      renderHome();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { toast.classList.remove("show"); }, 1300);
    }

    try {
      refreshWords();
      renderHome();
    } catch (error) {
      document.getElementById("app").innerHTML =
        '<section class="hero">' +
        '<p class="kicker">Startup Error</p>' +
        '<h1>読み込みに失敗しました</h1>' +
        '<p class="subtitle">JavaScriptの初期化に失敗しました。</p>' +
        '<pre style="white-space:pre-wrap;color:#ffe75e;font-size:12px;">' + escapeHTML(error.message || String(error)) + '</pre>' +
        '</section>';
    }
  </script>
</body>
</html>
